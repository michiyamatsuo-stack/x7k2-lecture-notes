<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <!-- ページタイトルを作品タイトルに差し替えてください -->
  <title>【作品タイトル】｜ジャーナリズム実習基礎 学生作品アーカイブ</title>
  <link rel="stylesheet" href="../css/style.css?v=2">
</head>
<body>
  <main class="work-page">
    <div class="work-profile">
      <!-- 学生の顔写真に差し替えてください（正方形推奨） -->
      <img class="work-profile__photo" src="https://placehold.co/200x200/eaf3fb/1e3a5f?text=Photo" alt="学生名の顔写真">
      <div>
        <div class="work-profile__name">学生名</div>
        <div class="work-profile__role">動画作品</div>
      </div>
    </div>

    <h1 class="work-title">【作品タイトル】をここに入力</h1>

    <!-- YouTubeの「共有」→「埋め込み」で取得したURL部分（/embed/xxxx）に差し替えてください -->
    <div class="video-frame-wrapper">
      <iframe
        src="https://www.youtube.com/embed/VIDEO_ID"
        title="作品動画"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
        allowfullscreen
      ></iframe>
    </div>

    <!-- 作品の説明文などがあれば入力してください（不要なら削除可） -->
    <p class="work-body">ここに作品の説明文を入力してください（任意）。</p>

    <a class="back-link" href="../index.html">← 一覧に戻る</a>
  </main>
</body>
</html>
