    <h1 class="work-title">地域防災の最前線を歩く</h1>

    <p class="work-body">大規模災害の発生が懸念される中、地域住民が主体となって取り組む防災訓練の現場を取材した。

町内会が主催する訓練には、子どもから高齢者まで幅広い世代が参加。避難経路の確認や簡易担架の作り方など、実践的な内容が続いた。

「訓練を重ねることで、いざという時に体が動く」と話す町内会長の言葉が印象的だった。</p>
