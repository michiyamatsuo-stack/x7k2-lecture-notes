<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <!-- ページタイトルを作品タイトルに差し替えてください -->
  <title>【作品タイトル】｜ジャーナリズム実習基礎 学生作品アーカイブ</title>
  <link rel="stylesheet" href="../css/style.css?v=2">
</head>
<body>
  <main class="work-page">
    <div class="work-profile">
      <!-- 学生の顔写真に差し替えてください（正方形推奨） -->
      <img class="work-profile__photo" src="https://placehold.co/200x200/eaf3fb/1e3a5f?text=Photo" alt="学生名の顔写真">
      <div>
        <div class="work-profile__name">学生名</div>
        <div class="work-profile__role">記事作品</div>
      </div>
    </div>

    <h1 class="work-title">【作品タイトル】をここに入力</h1>

    <!-- 原稿本文をここに入力してください（改行はそのまま反映されます） -->
    <p class="work-body">ここに記事の原稿本文を入力してください。

段落を分けたい場合は空行を入れてください。</p>

    <!-- 写真・グラフィックを複数枚並べる場合はimgタグを追加してください -->
    <div class="work-gallery">
      <img src="https://placehold.co/600x400/eaf3fb/1e3a5f?text=Photo+1" alt="写真の説明1">
      <img src="https://placehold.co/600x400/eaf3fb/1e3a5f?text=Photo+2" alt="写真の説明2">
    </div>

    <a class="back-link" href="../index.html">← 一覧に戻る</a>
  </main>
</body>
</html>
