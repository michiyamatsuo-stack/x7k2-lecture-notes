    <h1 class="work-title">商店街の灯を消さない ― 世代を超えた再生の記録</h1>

    <p class="work-body">シャッター街と呼ばれて久しい駅前商店街に、若い店主たちが次々と店を構え始めている。

かつて賑わいを見せた通りは、後継者不足と大型店の進出により空き店舗が目立つようになった。しかし、ここ数年でカフェや雑貨店を営む20〜30代の店主が増え、通りには少しずつ活気が戻りつつある。

「祖父の代から続く商店街を、違う形でもいいから残したかった」と語るのは、空き店舗を改装してカフェを開いた鈴木さん（29）。地域の高齢者と若い世代をつなぐ場として、店は地域の交流拠点にもなっている。</p>
